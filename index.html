<!DOCTYPE html>
<html>
  <head>
    <title>The Juice Garden</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #87CEEB">
      
      <!-- Sky Elements -->
      <!-- Sun -->
      <a-sphere position="15 10 -10" radius="1.5" color="#FFD700"></a-sphere>
      
      <!-- Lighting -->
      <a-light type="ambient" color="#FFFFFF" intensity="0.8"></a-light>
      <a-light type="directional" color="#FFFFFF" intensity="1" position="15 10 -10"></a-light>
      <a-light type="point" color="#FFD700" intensity="0.5" position="15 10 -10"></a-light>
      
      <!-- Clouds -->
      <a-sphere position="10 12 -15" radius="2" color="#FFFFFF" opacity="0.8"></a-sphere>
      <a-sphere position="12 12 -13" radius="1.8" color="#FFFFFF" opacity="0.8"></a-sphere>
      <a-sphere position="8 12 -13" radius="1.5" color="#FFFFFF" opacity="0.8"></a-sphere>
      
      <a-sphere position="-8 10 -20" radius="1.8" color="#FFFFFF" opacity="0.7"></a-sphere>
      <a-sphere position="-6 10 -18" radius="1.5" color="#FFFFFF" opacity="0.7"></a-sphere>
      <a-sphere position="-10 10 -18" radius="1.3" color="#FFFFFF" opacity="0.7"></a-sphere>
      
      <a-sphere position="5 15 5" radius="1.5" color="#FFFFFF" opacity="0.6"></a-sphere>
      <a-sphere position="7 15 7" radius="1.3" color="#FFFFFF" opacity="0.6"></a-sphere>
      
      <!-- Flying Birds -->
      <a-entity position="5 8 -5">
        <a-box position="0 0 0" width="0.3" height="0.05" depth="0.1" color="#000000"></a-box>
        <a-box position="-0.15 0 0.05" width="0.2" height="0.05" depth="0.08" color="#000000" rotation="0 0 -20"></a-box>
        <a-box position="0.15 0 0.05" width="0.2" height="0.05" depth="0.08" color="#000000" rotation="0 0 20"></a-box>
      </a-entity>
      
      <a-entity position="-3 10 -8">
        <a-box position="0 0 0" width="0.25" height="0.04" depth="0.08" color="#333333"></a-box>
        <a-box position="-0.12 0 0.04" width="0.15" height="0.04" depth="0.06" color="#333333" rotation="0 0 -15"></a-box>
        <a-box position="0.12 0 0.04" width="0.15" height="0.04" depth="0.06" color="#333333" rotation="0 0 15"></a-box>
      </a-entity>
      
      <a-entity position="8 12 3">
        <a-box position="0 0 0" width="0.35" height="0.06" depth="0.12" color="#000000"></a-box>
        <a-box position="-0.18 0 0.06" width="0.25" height="0.06" depth="0.1" color="#000000" rotation="0 0 -25"></a-box>
        <a-box position="0.18 0 0.06" width="0.25" height="0.06" depth="0.1" color="#000000" rotation="0 0 25"></a-box>
      </a-entity>
      
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#228B22"></a-plane>

      <a-box position="0 1.5 -15" width="30" height="3" depth="0.5" color="#D3D3D3"></a-box> <a-box position="-15 1.5 0" width="0.5" height="3" depth="30" color="#D3D3D3"></a-box> <a-box position="15 1.5 0" width="0.5" height="3" depth="30" color="#D3D3D3"></a-box> <a-box position="-8.5 1.5 15" width="13" height="3" depth="0.5" color="#D3D3D3"></a-box>
      <a-box position="8.5 1.5 15" width="13" height="3" depth="0.5" color="#D3D3D3"></a-box>
      
      <a-plane position="0 0.02 10" rotation="-90 0 0" width="3" height="10" color="#555"></a-plane>

      <a-entity position="0 0 0">
        <a-cylinder position="0 0.05 0" radius="4" height="0.1" color="#C0C0C0"></a-cylinder>
        
        <!-- Gazebo Support Posts -->
        <a-cylinder position="-3 2 -3" radius="0.15" height="4" color="#8B4513"></a-cylinder>
        <a-cylinder position="3 2 -3" radius="0.15" height="4" color="#8B4513"></a-cylinder>
        <a-cylinder position="-3 2 3" radius="0.15" height="4" color="#8B4513"></a-cylinder>
        <a-cylinder position="3 2 3" radius="0.15" height="4" color="#8B4513"></a-cylinder>
        
        <a-cone position="0 4 -0" radius-bottom="4.5" radius-top="0.1" height="1.5" color="#90EE90"></a-cone>
        <a-cylinder position="0 3 0" radius="4.2" height="0.1" segments-radial="8" color="#A9BA9D"></a-cylinder>
        
        <a-box position="0 0.8 0" width="1.5" height="0.1" depth="1.5" color="#5D2906"></a-box>
        
        <!-- Table legs -->
        <a-cylinder position="-0.6 0.4 -0.6" radius="0.05" height="0.8" color="#4B2C20"></a-cylinder>
        <a-cylinder position="0.6 0.4 -0.6" radius="0.05" height="0.8" color="#4B2C20"></a-cylinder>
        <a-cylinder position="-0.6 0.4 0.6" radius="0.05" height="0.8" color="#4B2C20"></a-cylinder>
        <a-cylinder position="0.6 0.4 0.6" radius="0.05" height="0.8" color="#4B2C20"></a-cylinder>
        
        <a-cylinder position="-0.3 0.9 0" radius="0.1" height="0.3" color="#006400"></a-cylinder> <a-text value="MILO" position="-0.3 0.9 0.11" color="#FFFFFF" scale="0.2 0.2 0.2" align="center"></a-text> <a-cylinder position="0.3 0.9 0" radius="0.1" height="0.25" color="#FFFDD0"></a-cylinder> <a-text value="MILK" position="0.3 0.9 0.11" color="#000000" scale="0.2 0.2 0.2" align="center"></a-text> <a-cylinder position="0 0.9 0.4" radius="0.05" height="0.1" color="#FF0000"></a-cylinder> <a-cylinder position="0 0.9 -0.4" radius="0.05" height="0.1" color="#0000FF"></a-cylinder> <a-entity position="0 0 1" rotation="0 180 0"> <a-box position="0 0.4 0" width="0.5" height="0.1" depth="0.5" color="#8B4513"></a-box>
           <a-box position="0 0.8 -0.25" width="0.5" height="0.8" depth="0.05" color="#8B4513"></a-box>
           <!-- Chair legs -->
           <a-cylinder position="-0.2 0.2 -0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
           <a-cylinder position="0.2 0.2 -0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
           <a-cylinder position="-0.2 0.2 0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
           <a-cylinder position="0.2 0.2 0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
        </a-entity>
        <a-entity position="0 0 -1" rotation="0 0 0"> <a-box position="0 0.4 0" width="0.5" height="0.1" depth="0.5" color="#8B4513"></a-box>
           <a-box position="0 0.8 -0.25" width="0.5" height="0.8" depth="0.05" color="#8B4513"></a-box>
           <!-- Chair legs -->
           <a-cylinder position="-0.2 0.2 -0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
           <a-cylinder position="0.2 0.2 -0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
           <a-cylinder position="-0.2 0.2 0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
           <a-cylinder position="0.2 0.2 0.2" radius="0.03" height="0.4" color="#4B2C20"></a-cylinder>
        </a-entity>
      </a-entity>

      <a-circle position="-7 0.03 -5" radius="3" rotation="-90 0 0" color="#00BFFF"></a-circle>
      <a-torus position="-7 0.03 -5" rotation="90 0 0" radius="3" radius-tubular="0.1" color="#808080"></a-torus>

      <!-- Animals near pond -->
      <!-- Cat 1 sitting by pond -->
      <a-entity position="-5 0.1 -4">
        <a-box position="0 0.2 0" width="0.4" height="0.3" depth="0.8" color="#FF8C00"></a-box>
        <a-sphere position="0 0.5 0.3" radius="0.2" color="#FF8C00"></a-sphere>
        <a-cone position="0 0.65 0.25" radius-bottom="0.15" radius-top="0.05" height="0.2" color="#FF8C00"></a-cone>
        <a-box position="-0.15 0.45 0.35" width="0.1" height="0.1" depth="0.05" color="#FFA500"></a-box>
        <a-box position="0.15 0.45 0.35" width="0.1" height="0.1" depth="0.05" color="#FFA500"></a-box>
        <a-cylinder position="-0.1 0.1 -0.2" radius="0.05" height="0.2" color="#FF8C00"></a-cylinder>
        <a-cylinder position="0.1 0.1 -0.2" radius="0.05" height="0.2" color="#FF8C00"></a-cylinder>
        <a-cylinder position="-0.1 0.1 0.3" radius="0.05" height="0.2" color="#FF8C00"></a-cylinder>
        <a-cylinder position="0.1 0.1 0.3" radius="0.05" height="0.2" color="#FF8C00"></a-cylinder>
      </a-entity>
      
      <!-- Dog 1 playing near pond -->
      <a-entity position="-9 0.1 -6" rotation="0 30 0">
        <a-box position="0 0.3 0" width="0.6" height="0.4" depth="1" color="#8B4513"></a-box>
        <a-sphere position="0 0.6 0.4" radius="0.25" color="#8B4513"></a-sphere>
        <a-box position="0 0.8 0.3" width="0.3" height="0.2" depth="0.4" color="#654321"></a-box>
        <a-box position="-0.2 0.65 0.45" width="0.12" height="0.12" depth="0.06" color="#000000"></a-box>
        <a-box position="0.2 0.65 0.45" width="0.12" height="0.12" depth="0.06" color="#000000"></a-box>
        <a-cylinder position="-0.15 0.15 -0.3" radius="0.08" height="0.3" color="#8B4513"></a-cylinder>
        <a-cylinder position="0.15 0.15 -0.3" radius="0.08" height="0.3" color="#8B4513"></a-cylinder>
        <a-cylinder position="-0.15 0.15 0.4" radius="0.08" height="0.3" color="#8B4513"></a-cylinder>
        <a-cylinder position="0.15 0.15 0.4" radius="0.08" height="0.3" color="#8B4513"></a-cylinder>
        <a-box position="0 0.4 -0.5" width="0.15" height="0.1" depth="0.3" color="#654321"></a-box>
      </a-entity>
      
      <!-- Cat 2 walking near pond -->
      <a-entity position="-8 0.1 -3" rotation="0 -45 0">
        <a-box position="0 0.15 0" width="0.35" height="0.25" depth="0.7" color="#808080"></a-box>
        <a-sphere position="0 0.4 0.25" radius="0.18" color="#808080"></a-sphere>
        <a-cone position="0 0.52 0.2" radius-bottom="0.12" radius-top="0.04" height="0.15" color="#808080"></a-cone>
        <a-box position="-0.12 0.38 0.3" width="0.08" height="0.08" depth="0.04" color="#FFD700"></a-box>
        <a-box position="0.12 0.38 0.3" width="0.08" height="0.08" depth="0.04" color="#FFD700"></a-box>
        <a-cylinder position="-0.08 0.07 -0.15" radius="0.04" height="0.15" color="#808080"></a-cylinder>
        <a-cylinder position="0.08 0.07 -0.15" radius="0.04" height="0.15" color="#808080"></a-cylinder>
        <a-cylinder position="-0.08 0.07 0.25" radius="0.04" height="0.15" color="#808080"></a-cylinder>
        <a-cylinder position="0.08 0.07 0.25" radius="0.04" height="0.15" color="#808080"></a-cylinder>
      </a-entity>

      <a-entity position="8 0 -6">
        <a-cylinder radius="0.2" height="2" color="#4B2C20"></a-cylinder>
        <a-sphere position="0 2 0" radius="1.2" color="#2E8B57"></a-sphere>
      </a-entity>
      <a-entity position="10 0 2">
        <a-cylinder radius="0.2" height="2" color="#4B2C20"></a-cylinder>
        <a-sphere position="0 2 0" radius="1" color="#006400"></a-sphere>
      </a-entity>
      
      <!-- Additional Trees -->
      <a-entity position="-8 0 -8">
        <a-cylinder radius="0.25" height="2.5" color="#654321"></a-cylinder>
        <a-sphere position="0 2.5 0" radius="1.5" color="#228B22"></a-sphere>
      </a-entity>
      <a-entity position="-10 0 8">
        <a-cylinder radius="0.3" height="3" color="#8B4513"></a-cylinder>
        <a-sphere position="0 3 0" radius="1.8" color="#006400"></a-sphere>
      </a-entity>
      
      <a-box position="6 0.1 5" width="4" height="0.2" depth="2" color="#3D2B1F"></a-box>
      <a-sphere position="5.5 0.3 5" radius="0.15" color="red"></a-sphere>
      <a-sphere position="6.5 0.3 5.5" radius="0.15" color="yellow"></a-sphere>
      <a-sphere position="7.5 0.3 4.5" radius="0.15" color="pink"></a-sphere>

      <!-- Barbecue Grill at Right Corner -->
      <a-entity position="12 0 12">
        <!-- Grill Base -->
        <a-box position="0 0.4 0" width="1.5" height="0.8" depth="0.8" color="#2C2C2C"></a-box>
        
        <!-- Grill Legs -->
        <a-cylinder position="-0.6 0.2 -0.3" radius="0.05" height="0.4" color="#1C1C1C"></a-cylinder>
        <a-cylinder position="0.6 0.2 -0.3" radius="0.05" height="0.4" color="#1C1C1C"></a-cylinder>
        <a-cylinder position="-0.6 0.2 0.3" radius="0.05" height="0.4" color="#1C1C1C"></a-cylinder>
        <a-cylinder position="0.6 0.2 0.3" radius="0.05" height="0.4" color="#1C1C1C"></a-cylinder>
        
        <!-- Grill Grate -->
        <a-box position="0 0.85 0" width="1.2" height="0.05" depth="0.6" color="#808080"></a-box>
        <a-box position="0 0.85 0" width="1.2" height="0.05" depth="0.6" color="#808080" rotation="0 0 90"></a-box>
        
        <!-- Grill Lid -->
        <a-box position="0 1.2 -0.4" width="1.4" height="0.8" depth="0.1" color="#2C2C2C" rotation="45 0 0"></a-box>
        
        <!-- Control Knobs -->
        <a-cylinder position="-0.4 0.4 0.45" radius="0.03" height="0.1" color="#FF0000"></a-cylinder>
        <a-cylinder position="0 0.4 0.45" radius="0.03" height="0.1" color="#FF0000"></a-cylinder>
        <a-cylinder position="0.4 0.4 0.45" radius="0.03" height="0.1" color="#FF0000"></a-cylinder>
        
        <!-- Smoke -->
        <a-sphere position="0 1.5 0" radius="0.2" color="#FFFFFF" opacity="0.3"></a-sphere>
        <a-sphere position="0 1.8 0" radius="0.15" color="#FFFFFF" opacity="0.2"></a-sphere>
        <a-sphere position="0 2.1 0" radius="0.1" color="#FFFFFF" opacity="0.1"></a-sphere>
      </a-entity>

      <a-entity position="0 1.6 18">
        <a-camera></a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
